name: Java CI with Maven

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java: [ '21' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean compile

    - name: Run tests
      run: mvn test

    - name: Generate test report
      if: always()
      run: mvn surefire-report:report-only

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-jdk-${{ matrix.java }}
        path: target/surefire-reports/

    - name: Check test coverage (optional)
      run: |
        echo "Tests completed. Coverage report would go here."
        # To enable coverage: mvn jacoco:report

    - name: Comment test results on PR
      if: github.event_name == 'pull_request' && always()
      uses: dorny/test-reporter@v1
      with:
        name: Maven Tests (JDK ${{ matrix.java }})
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: true

  code-quality:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run SpotBugs (optional)
      run: |
        echo "SpotBugs analysis would run here"
        # mvn spotbugs:check

    - name: Check code formatting (optional)
      run: |
        echo "Code formatting check would run here"
        # mvn spotless:check

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run integration tests
      run: |
        echo "Integration tests would run here"
        # mvn verify -P integration-tests

    - name: Upload integration test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: target/failsafe-reports/
